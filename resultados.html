<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados PREP - INE</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* --- VARIABLES Y RESET (Estilo INE) --- */
        :root {
            --ine-guinda: #6A0032;
            --ine-dorado: #BC955C;
            --ine-rosa: #D0021B;
            --blanco: #FFFFFF;
            --gris-claro: #F5F5F5;
            --gris-texto: #333;
            --sombra: 0 4px 6px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--gris-claro);
            color: var(--gris-texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--blanco);
            border-bottom: 4px solid var(--ine-rosa);
            padding: 1rem;
            box-shadow: var(--sombra);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header-logo {
            width: 80px;
            height: auto;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .header-titles h1 {
            color: var(--ine-guinda);
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--ine-dorado);
            display: inline-block;
            padding-bottom: 2px;
        }

        .header-titles p {
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }

        /* --- MAIN --- */
        main {
            flex: 1;
            padding: 1rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- SECCIÓN RESULTADOS --- */
        #results-section {
            background: var(--blanco);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: var(--sombra);
            margin-top: 2rem;
            text-align: center;
        }

        .total-badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            background-color: var(--ine-guinda);
            border: 2px solid var(--ine-guinda);
            color: var(--blanco);
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .btn-primary {
            background-color: var(--ine-rosa);
            color: var(--blanco);
            border: none;
            padding: 1rem 2rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 2rem;
            transition: opacity 0.3s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                padding: 1rem 2rem;
            }
            .chart-container {
                height: 400px;
                width: 80%;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Flag_of_Mexico.svg/200px-Flag_of_Mexico.svg.png" alt="Bandera de México" class="header-logo">
            <div class="header-titles">
                <h1>Elecciones Federales 2026</h1>
                <p>Instituto Nacional Electoral - Resultados Preliminares (PREP).</p>
            </div>
        </div>
    </header>

    <main>
        <section id="results-section">
            <h2 style="color: var(--ine-guinda); margin-bottom: 2rem;">Resultados en Tiempo Real</h2>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
            <div class="total-badge" id="total-votos-badge">
                Total de Votos: 0
            </div>
            <br>
            <button class="btn-primary" onclick="volverInicio()">Volver al Inicio (Nueva Votación)</button>
        </section>
    </main>

    <script>
        window.onload = function() {
            // 1. Recuperar conteo de votos
            const votos = JSON.parse(localStorage.getItem('conteo_votos')) || {};
            
            // 2. Definir candidatos y colores
            const etiquetas = ['Claudia Sheinbaum', 'Xóchitl Gálvez', 'Jorge Álvarez Máynez', 'AMLO', 'Ricardo Anaya', 'José Antonio Meade', 'El Bronco', 'Margarita Zavala'];
            const colores = ['#6A0032', '#004a8f', '#FF8000', '#6A0032', '#004a8f', '#00953B', '#4A4A4A', '#78909C'];
            
            // 3. Preparar datos para la gráfica
            let total = 0;
            const dataVotos = etiquetas.map(c => {
                const v = votos[c] || 0;
                total += v;
                return v;
            });

            document.getElementById('total-votos-badge').textContent = "Total de Votos: " + total;

            // 4. Renderizar Gráfica con Chart.js
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: etiquetas,
                    datasets: [{
                        label: '# de Votos',
                        data: dataVotos,
                        backgroundColor: colores,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
                    plugins: {
                        legend: { display: false },
                        title: { display: true, text: 'Conteo Oficial', font: { size: 16 } }
                    }
                }
            });
        };

        function volverInicio() {
            // Regresa a la pantalla de login (index.html)
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
