<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boleta Electoral - INE</title>
    
    <style>
        /* --- VARIABLES Y RESET --- */
        :root {
            --ine-guinda: #6A0032;
            --ine-dorado: #BC955C;
            --ine-rosa: #D0021B;
            --blanco: #FFFFFF;
            --gris-claro: #F5F5F5;
            --gris-texto: #333;
            --sombra: 0 4px 6px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--gris-claro);
            color: var(--gris-texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--blanco);
            border-bottom: 4px solid var(--ine-rosa);
            padding: 1rem;
            box-shadow: var(--sombra);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header-logo {
            width: 80px;
            height: auto;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .header-titles h1 {
            color: var(--ine-guinda);
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--ine-dorado);
            display: inline-block;
            padding-bottom: 2px;
        }

        .header-titles p {
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }

        #user-info {
            display: flex;
            font-weight: bold;
            color: var(--ine-guinda);
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-logout {
            background-color: var(--ine-guinda);
            color: var(--blanco);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        main {
            flex: 1;
            padding: 1rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- SECCIÓN LOGIN --- */
        #login-section {
            background: var(--blanco);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: var(--sombra);
            max-width: 400px;
            margin: 2rem auto;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--ine-guinda);
            font-weight: bold;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        input:read-only {
            background-color: #e9ecef;
            color: var(--ine-guinda);
            font-weight: bold;
        }

        .btn-primary {
            background-color: var(--ine-rosa);
            color: var(--blanco);
            border: none;
            padding: 1rem 2rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .btn-primary:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: var(--blanco);
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        /* --- MODAL BIOMÉTRICO --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .fingerprint-container {
            width: 80px;
            height: 80px;
            margin: 1.5rem auto;
            position: relative;
            cursor: pointer;
            border: 2px solid #ddd;
            border-radius: 50%;
            padding: 10px;
            transition: all 0.3s;
        }

        .fingerprint-container:active {
            transform: scale(0.95);
            border-color: var(--ine-guinda);
        }

        .fingerprint-icon {
            width: 100%;
            height: 100%;
            opacity: 0.6;
        }

        .scan-line {
            display: none; /* Se activa con JS */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--ine-rosa);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--ine-rosa);
            animation: scan 1.5s infinite alternate;
        }

        @keyframes scan {
            0% { top: 10%; }
            100% { top: 90%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <!-- Imagen de la Bandera/Escudo -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/Flag_of_Mexico.svg/200px-Flag_of_Mexico.svg.png" alt="Bandera de México" class="header-logo">
            <div class="header-titles">
                <h1>Elecciones Federales 2026</h1>
                <p>Instituto Nacional Electoral - Tu voto es libre y secreto.</p>
            </div>
        </div>
    </header>

    <main>
        <!-- LOGIN -->
        <section id="login-section">
            <h2 style="color: var(--ine-guinda); margin-bottom: 1rem;">Acceso al Ciudadano 2026</h2>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 1.5rem;">Ingrese sus datos tal como aparecen en su credencial para votar.</p>
            <div class="form-group">
                <label for="nombres">Nombres:</label>
                <input type="text" id="nombres" placeholder="Ingrese sus nombres">
            </div>
            <div class="form-group">
                <label for="apellidos">Apellidos:</label>
                <input type="text" id="apellidos" placeholder="Ingrese sus apellidos">
            </div>
            <div class="form-group">
                <label for="curp">CURP:</label>
                <input type="text" id="curp" placeholder="Ingrese su CURP" maxlength="18" oninput="autocompletarDatos()">
            </div>
            <div class="form-group">
                <label for="fecha_nacimiento">Fecha de Nacimiento (Auto):</label>
                <input type="text" id="fecha_nacimiento" readonly placeholder="Se calculará del CURP">
            </div>
            <div class="form-group">
                <label for="edad">Edad (Verificación):</label>
                <input type="text" id="edad" readonly placeholder="Edad calculada automáticamene">
            </div>
            <div class="form-group">
                <label for="idmex">IDMEX (Solo Números):</label>
                <input type="text" id="idmex" placeholder="ID de elector (Solo números)" maxlength="13" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <button class="btn-primary" id="btn-ingresar" onclick="iniciarSesion()">Ingresar al Sistema</button>
        </section>

        <!-- MODAL BIOMÉTRICO (Oculto por defecto) -->
        <div id="modal-biometrico" class="modal-overlay">
            <div class="modal-content">
                <h3 style="color: var(--ine-guinda); margin-bottom: 0.5rem;">Autenticación Requerida</h3>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 1rem;">Valide su identidad con los sensores de su dispositivo.</p>
                
                <div id="huella-container" class="fingerprint-container" style="border: none; cursor: default;" onclick="iniciarAutenticacionBiometrica()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Fingerprint_picture.svg/480px-Fingerprint_picture.svg.png" alt="Huella" class="fingerprint-icon">
                </div>

                <p id="bio-status" style="font-weight: bold; color: var(--ine-guinda); margin-bottom: 1.5rem;">Esperando autorización...</p>
                
                <button id="btn-bio-auth" class="btn-primary" onclick="iniciarAutenticacionBiometrica()">Autorizar con Huella / Cara</button>
                <button class="btn-secondary" onclick="cerrarBiometria()" style="font-size: 0.9rem; background: #666;">Cancelar</button>
            </div>
        </div>
    </main>

    <script>
        // --- LÓGICA DE NEGOCIO ---

        // 1. Autocompletado de Datos (Fecha y Nombre) desde CURP
        function autocompletarDatos() {
            const curp = document.getElementById('curp').value.toUpperCase();
            const campoFecha = document.getElementById('fecha_nacimiento');
            const campoEdad = document.getElementById('edad');
            const btnIngresar = document.getElementById('btn-ingresar');
            
            if (curp.length >= 10) {
                // Posiciones 5 a 10 (índices 4 a 9)
                const fechaStr = curp.substring(4, 10); // AA-MM-DD
                let anio = parseInt(fechaStr.substring(0, 2));
                const mes = fechaStr.substring(2, 4);
                const dia = fechaStr.substring(4, 6);

                // Ajuste de siglo básico (Si el año es menor a 40 asumimos 2000, si no 1900)
                // En un sistema real se valida con el digito 17 del CURP (Numero=1900, Letra=2000)
                const anioCompleto = (anio < 40) ? 2000 + anio : 1900 + anio;

                campoFecha.value = `${dia}/${mes}/${anioCompleto}`;

                // Calcular Edad
                const hoy = new Date();
                // Fecha actual simulada a 2026 como pide el sistema
                const fechaActual = new Date(2026, 5, 2); // 2 de Junio 2026
                
                let edad = fechaActual.getFullYear() - anioCompleto;
                const mesNac = parseInt(mes) - 1; // JS meses 0-11
                const diaNac = parseInt(dia);

                if (fechaActual.getMonth() < mesNac || (fechaActual.getMonth() === mesNac && fechaActual.getDate() < diaNac)) {
                    edad--;
                }

                campoEdad.value = `${edad} años`;

                if (edad < 18) {
                    campoEdad.style.color = "red";
                    campoEdad.value += " (MENOR DE EDAD - NO PUEDE VOTAR)";
                    btnIngresar.disabled = true;
                } else {
                    campoEdad.style.color = "green";
                    campoEdad.value += " (HABILITADO)";
                    btnIngresar.disabled = false;
                }
            } else {
                campoFecha.value = '';
                campoEdad.value = '';
                campoEdad.style.color = "#333";
                btnIngresar.disabled = false;
            }
        }

        // 2. Iniciar Sesión y Validación
        function iniciarSesion() {
            const nombres = document.getElementById('nombres').value;
            const apellidos = document.getElementById('apellidos').value;
            const idmex = document.getElementById('idmex').value;
            const curp = document.getElementById('curp').value;
            const edadTexto = document.getElementById('edad').value;

            if (!nombres || !apellidos || !curp || !idmex) {
                alert("Por favor llene todos los campos (Nombres, Apellidos, CURP e IDMEX).");
                return;
            }

            if (edadTexto.includes("MENOR DE EDAD")) {
                alert("Lo sentimos, solo los mayores de 18 años pueden votar.");
                return;
            }

            // --- SEGURIDAD: VALIDACIÓN DE BASE DE DATOS ---
            // Buscamos en la "Base de Datos" (LocalStorage) si el IDMEX ya existe
            const padronElectoral = JSON.parse(localStorage.getItem('padron_electoral_db')) || [];
            
            const ciudadanoExistente = padronElectoral.find(c => c.idmex === idmex);

            if (ciudadanoExistente) {
                if (ciudadanoExistente.estado === "Ya votó") {
                    alert("ALERTA DE SEGURIDAD: Este IDMEX ya ha registrado su voto.\n\nAcceso bloqueado por protocolo antifraude.");
                    window.location.href = "resultados.html"; // Ir directo a resultados si ya votó
                    document.getElementById('login-section').style.display = 'none';
                    return;
                }
            }

            // --- SEGURIDAD: ACTIVAR MODAL BIOMÉTRICO ---
            // En lugar de confirm(), mostramos el modal profesional
            document.getElementById('modal-biometrico').style.display = 'flex';
        }

        // 2.1 Módulo de Autenticación Biométrica (WebAuthn)
        function cerrarBiometria() {
            document.getElementById('modal-biometrico').style.display = 'none';
            document.getElementById('bio-status').textContent = "Esperando autorización...";
            document.getElementById('bio-status').style.color = "var(--ine-guinda)";
            document.getElementById('btn-bio-auth').style.display = "inline-block";
            document.getElementById('btn-bio-auth').disabled = false;
        }

        async function iniciarAutenticacionBiometrica() {
            const status = document.getElementById('bio-status');
            const btn = document.getElementById('btn-bio-auth');
            
            // 1. Verificación de Seguridad del Navegador
            if (!window.isSecureContext) {
                alert("AVISO DE SEGURIDAD:\n\nAunque ya tengas alojamiento, asegúrate de entrar a tu página usando 'https://' al principio.\n\nSin HTTPS, el navegador bloquea el sensor de huella por seguridad.");
                status.textContent = "⚠️ Error: Falta HTTPS";
                status.style.color = "red";
                return;
            }

            if (!window.PublicKeyCredential) {
                alert("Tu dispositivo no soporta biometría web (WebAuthn).");
                return;
            }

            // Actualizar UI
            status.textContent = "📲 Activando sensor... Coloca tu huella";
            status.style.color = "#BC955C"; 
            btn.disabled = true;

            // 2. Configuración WebAuthn (Huella Real)
            const challenge = new Uint8Array(32);
            window.crypto.getRandomValues(challenge);

            const publicKey = {
                challenge: challenge,
                rp: { name: "INE Votación 2026" },
                user: {
                    id: Uint8Array.from("USER-" + Date.now(), c => c.charCodeAt(0)), // ID único sesión
                    name: "ciudadano@ine.mx",
                    displayName: "Votante"
                },
                pubKeyCredParams: [
                    {alg: -7, type: "public-key"}, // ES256
                    {alg: -257, type: "public-key"} // RS256
                ],
                authenticatorSelection: {
                    authenticatorAttachment: "platform", // <--- ESTO OBLIGA A USAR EL SENSOR DEL CELULAR
                    userVerification: "required"
                },
                timeout: 60000,
                attestation: "none"
            };

            try {
                // 3. Llamada al Hardware (Android/iOS)
                const credential = await navigator.credentials.create({ publicKey });
                
                // 4. Éxito: Huella reconocida
                console.log("Biometría OK:", credential);
                
                const token = "INE-REAL-AUTH-" + Date.now();
                localStorage.setItem('ine_auth_token', token);

                status.textContent = "✔ Identidad Verificada";
                status.style.color = "green";
                
                // Vibración de éxito
                if (navigator.vibrate) navigator.vibrate(200);

                setTimeout(() => {
                    completarLogin();
                }, 500);

            } catch (err) {
                // 5. Error o Cancelación
                console.error(err);
                btn.disabled = false;

                let msg = "Error desconocido.";
                if (err.name === "NotAllowedError") {
                    msg = "Cancelaste la operación o expiró el tiempo.";
                } else if (err.name === "NotSupportedError") {
                    msg = "Tu dispositivo no tiene bloqueo de pantalla (PIN/Huella) configurado.";
                } else {
                    msg = err.message;
                }

                status.textContent = "⚠️ Falló la autenticación";
                status.style.color = "red";
                alert("No se pudo activar el sensor:\n" + msg);
            }
        }

        // 2.2 Completar Login tras Biometría Exitosa
        function completarLogin() {
            cerrarBiometria(); // Ocultar modal

            const idmex = document.getElementById('idmex').value;
            const nombres = document.getElementById('nombres').value;
            const apellidos = document.getElementById('apellidos').value;
            const curp = document.getElementById('curp').value;
            const fechaNac = document.getElementById('fecha_nacimiento').value;
            
            // Guardar sesión temporal para usarla en el siguiente archivo
            localStorage.setItem('usuario_actual', idmex);
            localStorage.setItem('temp_nombres', nombres);
            localStorage.setItem('temp_apellidos', apellidos);
            localStorage.setItem('temp_curp', curp);
            localStorage.setItem('temp_fecha', fechaNac);
            
            // REDIRECCIÓN A LA PÁGINA DE VOTOS
            window.location.href = "votos.html";
        }
    </script>
</body>
</html>
